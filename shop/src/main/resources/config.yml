# ═══════════════════════════════════════════════════════════════════
# Shop 플러그인 v1.3.1 — 상점 아이템 카탈로그
# ═══════════════════════════════════════════════════════════════════

# ─── 시세 누적 폭락 트리거 ────────────────────────────────────────
#   한 시세 타임 (≈20분) 안에 같은 아이템 누적 판매량 기준:
#     - threshold-low  미만: 폭락 없음
#     - low ~ high 사이: 거래 1회당 1번 확률 굴림 (선형 보간, low=0% ~ high=100%)
#     - threshold-high 정수배 도달 분: 확정 폭락 N회 (top seller 표기)
#   확률 폭락 발동 시 chunk 게이지 리셋. 확정 폭락은 high 단위로 차감.
#   다음 시세 타임 시작 시 chunk 누적 초기화 + 자연 회복 시작.
price-crash:
  enabled: true
  threshold-low: 640       # 10세트(64×10) — 이 양부터 확률적 폭락 시작 (0%)
  threshold-high: 1600     # 25세트(64×25) — 100% 확률 + 1600 단위 결정적 추가 폭락
  multiplier: 0.75         # 발동 시 현재 가격에 곱하기 (= 25% 인하)


#
# ─── 가격 모델 ─────────────────────────────────────────────────────
#   buy 만 있음     → 구매 전용 (씨앗·티켓·램프). 가격 고정.
#   sell 만 있음    → 판매 전용 (열매). 시세 변동.
#                     구매가 = 판매가 × buy-multiplier 자동 계산.
#   buy + sell 둘 다 있음 → 양방향 (광물 등). buy 값은 무시.
#                     항상 sell × buy-multiplier 로 계산되어 차익거래 불가.
#
# ─── 필드 ──────────────────────────────────────────────────────────
#   id              : 고유 식별자 (영소문자/숫자/_)
#   category        : MINERAL / CROP / LAMP  (FISHING은 동적이라 등록 불가)
#   material        : 바닐라 아이템 Material
#   provider        : 커스텀 라우팅 ("Farming" / "CustomItems")
#   type            : provider 내부 타입 (cropId / "FARMLAND_BLOCK" / "LIFE")
#   buy             : 구매가 (구매 전용일 때만 사용)
#   sell            : 판매가 base (판매 가능일 때 필수)
#   buy-multiplier  : 품목별 배수. 미지정시 10.0. (sellable 항목에서만 의미)
#   name            : 표시명
#   icon            : GUI 아이콘 (provider 아이템의 fallback)
#
# ─── 작물 GUI 탭 ────────────────────────────────────────────────────
#   provider=Farming + type=FARMLAND_BLOCK → 씨앗 탭
#   provider=Farming + type=cropId + sell 없음 → 씨앗 탭 (구매 전용 씨앗)
#   provider=Farming + type=cropId + sell 있음 → 열매 탭 (판매 전용 열매)
# ═══════════════════════════════════════════════════════════════════

# ─── GUI 버튼 스타일 ────────────────────────────────────────────────
# 상점 GUI의 구매/판매 버튼 아이콘 커스터마이징.
# - material: Bukkit Material 이름. 미지정시 디폴트 (글래스 페인) 유지.
# - custom-model-data: 리소스팩 CMD 인덱스. 0이거나 미지정시 CMD 안 씀.
#
# 디폴트 (이 섹션 통째로 없으면):
#   buy        = LIME_STAINED_GLASS_PANE      (초록 = 구매)
#   sell       = RED_STAINED_GLASS_PANE       (빨강 = 판매)
#   sell-all   = ORANGE_STAINED_GLASS_PANE    (주황 = 전체 판매)
#   sell-disabled = GRAY_STAINED_GLASS_PANE   (회색 = 비활성)
gui:
  # 모두 PAPER + CMD 매핑 (shop_buttons_pack_v3 리소스팩 적용 시 커스텀 텍스처)
  # 리소스팩 미적용 시 일반 종이로 보임 — 기능 동작엔 영향 없음
  buy-button:
    material: PAPER
    custom-model-data: 1
  sell-button:
    material: PAPER
    custom-model-data: 2
  sell-all-button:
    material: PAPER
    custom-model-data: 3
  sell-disabled:
    material: PAPER
    custom-model-data: 4

  # 네비게이션 버튼 (페이지 이동 / 닫기)
  nav-prev:
    material: PAPER
    custom-model-data: 5
  nav-next:
    material: PAPER
    custom-model-data: 6
  nav-close:
    material: BARRIER
    custom-model-data: 0

# ─── GUI 탭 설정 ────────────────────────────────────────────────────
# 카테고리별로 GUI 상단에 탭 버튼을 배치. 탭 미설정 카테고리는 단일 페이지 모드.
#
# 각 탭 항목:
#   id                : 탭 식별자 (영문 대문자, 같은 카테고리 내 고유)
#   name              : 표시명 (§a 같은 색상 코드 사용 가능)
#   slot              : 0행에서 표시될 슬롯 (0~8). 같은 카테고리 내 중복 금지.
#   default           : 카테고리 첫 진입 시 이 탭으로 열림 (선택, 없으면 첫 번째 탭)
#   filter            : 탭에 표시될 ShopItem 필터 (variants/materials/ids 중 하나라도 매칭)
#                       - variants: ShopItem.variant 매칭 (Farming용. SEED/FRUIT/TICKET)
#                       - materials: Material 이름 리스트 (광물 분류 등)
#                       - ids: 명시적 id 리스트
#                       비어있으면 카테고리의 모든 아이템 표시
#
# 아이콘 — 두 가지 모드 (우선순위 순):
#   1) provider 모드: 외부 플러그인의 진짜 아이템을 발급해 사용 (PDC + CMD 자동)
#      icon-provider : "Farming" 또는 "CustomItems"
#      icon-type     : provider 내부 타입 (cropId, "FARMLAND_BLOCK", "LIFE" 등)
#      icon-variant  : "SEED" / "FRUIT" / "TICKET" (Farming만 의미)
#      → 본문 아이템과 동일 텍스처 보장
#
#   2) Material 모드: 단순 Material + 선택적 CMD
#      icon              : Bukkit Material 이름
#      custom-model-data : 리소스팩 CMD 인덱스 (선택, 0이면 미적용)
#
#   provider 모드를 쓸 때 icon 필드도 함께 두면 provider 실패 시 fallback 됨.
tabs:
  CROP:
    - id: SEED
      name: "§a씨앗 / 경작지"
      icon-provider: Farming    # CropItemProvider 통해 진짜 밀 씨앗 발급 → 본문과 동일 텍스처
      icon-type: wheat          # cropId
      icon-variant: SEED        # SEED / FRUIT / TICKET
      icon: WHEAT_SEEDS         # provider 실패 시 fallback
      slot: 2
      default: true
      filter:
        variants: [SEED, TICKET]

    - id: FRUIT
      name: "§e열매"
      icon-provider: Farming    # CropItemProvider 통해 진짜 밀 발급
      icon-type: wheat
      icon-variant: FRUIT
      icon: WHEAT               # provider 실패 시 fallback
      slot: 6
      filter:
        variants: [FRUIT]

    - id: TOOL
      name: "§b농사도구"
      icon: WOODEN_HOE
      slot: 4
      filter:
        ids: [watering_can_copper, watering_can_iron, watering_can_diamond,
              sprinkler_iron]

  GENERAL:
    - id: CONSUMABLE
      name: "§e소모품"
      icon: FIREWORK_ROCKET
      slot: 2
      default: true
      filter:
        ids: [bigmac, firework, inv_save, string, heavy_core,
              golden_apple, enchanted_golden_apple, arrow, flint_and_steel]

    - id: WEAPON_ENCH
      name: "§c무기 인챈트"
      icon: DIAMOND_SWORD
      slot: 5
      filter:
        ids: [ench_sharpness5, ench_smite5, ench_sweeping3, ench_looting3,
              ench_lunge3, ench_impaling5, ench_channeling, ench_riptide3,
              ench_wind_burst3, ench_density5, ench_breach4, ench_loyalty3,
              ench_fire_aspect2, ench_flame,
              ench_infinity, ench_power5]

    - id: OTHER_ENCH
      name: "§b도구·방어구 인챈트"
      icon: DIAMOND_PICKAXE
      slot: 7
      filter:
        ids: [ench_efficiency5, ench_fortune3, ench_unbreaking3, ench_mending,
              ench_protection4, ench_feather_falling4, ench_depth_strider3,
              ench_soul_speed3, ench_aqua_affinity, ench_respiration3, ench_lure3]

  # MINERAL / LAMP 는 탭 미설정 → 단일 페이지 모드 (기존 동작 유지)
  # 추후 광물도 분류하고 싶으면 여기에 추가:
