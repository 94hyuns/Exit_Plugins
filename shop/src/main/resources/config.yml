# 잡화상인 NPC가 취급. 모두 구매 전용(고정 가격).
#
# 바닐라 ItemStack 위에 yml 메타 옵션을 얹어서 발급한다.
#   display-name        : "&6빅맥" — & 색상 코드 사용 가능
#   custom-model-data   : 리소스팩 CMD (양의 정수, 0/미지정시 미적용)
#   enchantments        : ["sharpness:5", "mending:1"] 형식
#                         ENCHANTED_BOOK 이면 자동으로 stored enchant로 들어감
