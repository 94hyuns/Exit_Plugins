# 던전 몹 처치 시 보상 설정
#
# 최상위 키는 MythicMobs의 몹 내부 이름 (YAML의 Type이 아니라 몹 정의 이름).
# 예시: Mush_Warrior, Anubis
#
# 각 몹마다 다음 3가지 섹션을 가질 수 있음:
#   - money: 지급되는 돈 (min-max 사이 랜덤)
#   - messageOnKill: 처치 시 플레이어 채팅에 표시될 메시지 (선택)
#   - drops: 아이템 드롭 목록
#       item: Material 이름 (https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html)
#       amount: "N" 고정 수량 또는 "N-M" 범위 랜덤
#       chance: 0.0 ~ 1.0 사이 드롭 확률
#       displayName: (선택) 아이템 표시 이름. 색상 코드 &사용 가능
#
# 플레이어 근처 사망 시에만 보상 지급 (환경 자해 등 제외)
# 동일 몹에 여러 드롭 정의 가능, 각자 독립 확률로 판정
#
# 수정 후 /dungeonrewards reload

rewards:
  Mush_Warrior:
    money:
      min: 40
      max: 60
    messageOnKill: "&7[&a+&a{money}w&7] &f버섯전사 처치"
    drops:
      - item: BROWN_MUSHROOM
        amount: 1-3
        chance: 0.8
      - item: RED_MUSHROOM
        amount: 1-2
        chance: 0.3
      - item: EMERALD
        amount: 1
        chance: 0.05

  Anubis:
    money:
      min: 5000
      max: 8000
    messageOnKill: "&6&l[&e&l+&e&l{money}w&6&l] &r&6&l아누비스 처치!"
    drops:
      - item: DIAMOND
        amount: 5-10
        chance: 1.0
      - item: NETHERITE_INGOT
        amount: 1
        chance: 0.3
      - item: GOLDEN_APPLE
        amount: 3-5
        chance: 1.0

# 공통 설정
settings:
  # 돈/아이템을 받을 수 있는 최소 플레이어 거리 (몹으로부터 N블록 이내 플레이어만 보상)
  # 0 이하이면 거리 제한 없음 (데미지 준 플레이어에게만 지급)
  proximityRange: 0

  # 보상 지급 대상
  #   KILLER_ONLY: 최종 타격 플레이어에게만 (기본)
  #   ALL_DAMAGERS: 데미지 준 모든 플레이어에게 균등 분배 (드롭은 최종타만, 돈만 분배)
  rewardTarget: KILLER_ONLY

  # 드롭 아이템을 몹 위치에 자연 드롭할지, 플레이어 인벤에 직접 넣을지
  #   DROP: 몹 사망 위치에 떨어뜨림 (기본)
  #   GIVE: 플레이어에게 직접 지급 (인벤 꽉 찼으면 발밑에 떨어뜨림)
  dropMode: DROP
