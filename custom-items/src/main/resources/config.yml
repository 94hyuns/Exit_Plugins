# ============================================
# CustomItems - 램프 설정
# ============================================

lamp:
  # 람프 사용 시 붙는 인챈트 줄 수의 가중치 (생활램프 기본).
  # 예: [3, 7] => 1줄 30%, 2줄 70%. (2026-05-14: 2줄 비중 ↑ 으로 종결 접근성 강화)
  line-count-weights: [3, 7]

  # 전투람프 전용 가중치. 누락 시 line-count-weights 사용.
  # [4, 6] => 1줄 40%, 2줄 60% (방어구 4부위 풀세팅 접근성 ↑)
  line-count-weights-combat: [4, 6]

  # 레벨 롤 분포 편향 계수 (level-bias).
  # - 1.0: 균등 분포 (모든 레벨 값이 같은 확률)
  # - 2.0: 낮은 값에 제곱 비례 가중 (기본값)
  # - 3.0 이상: 낮은 값에 더 강하게 쏠림
  # 수식: weight(i) = (N - i) ^ bias, i는 0부터 시작 (낮은 값일수록 i 작음)
  level-bias: 2.0

  # 롤 실행 시 재생할 사운드와 파라미터.
  roll-sound:
    name: BLOCK_ANVIL_USE
    volume: 1.0
    pitch: 1.0

# "야생 한정" 인챈트가 발동 가능한 월드 이름 리스트.
# land 플러그인 연동 전까지 월드 이름 매칭으로 대체.
wilderness-worlds:
  - "world_wild"
  - "world_nether"     # 네더 차원 — 항상 야생 (커스텀 인챈트 작동)
  - "world_the_end"    # 엔더 차원 — 항상 야생

# 인챈트 롤 시 범위별 가중치.
# common(공통)은 해당 카테고리의 모든 도구에 적용 가능한 인챈트.
# tool-specific(특정)은 특정 도구 전용 인챈트.
# 값이 클수록 해당 범위의 인챈트가 더 자주 롤됨.
enchant-weights:
  common: 5
  tool-specific: 5
