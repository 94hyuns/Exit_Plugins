name: Core
version: 1.7.0
main: com.exit.core.CorePlugin
api-version: 1.21
description: 서버 공통 코어 플러그인 - 데이터 관리 및 서비스 레지스트리

commands:
  도움:
    description: 초보자용 명령어 안내
    usage: /도움
    aliases: [help-beginner]
  관리자검사:
    description: 플레이어의 인벤토리/직업/화폐 통합 조회 (읽기 전용)
    usage: /관리자검사 <닉네임>
    permission: core.admin
    permission-message: 권한이 없습니다.

permissions:
  core.admin:
    description: Core 관리자 명령어 사용 권한
    default: op
