# ═══════════════════════════════════════════════════════════════════
# Cosmetics 플러그인 — 카탈로그 & 뽑기/가루/뽑기권/연출 설정
# ═══════════════════════════════════════════════════════════════════

# ─── 뽑기 설정 ──────────────────────────────────────────────────────
gacha:
  # 뽑기권 1장 가격 (울캐쉬)
  single_price: 1000
  # 뽑기권 10장 묶음 가격 (할인 적용. 9000으로 두면 원가 10000 대비 10% 할인)
  ten_price: 9000
  # 등급별 출현 가중치
  weights:
    COMMON: 0
    RARE: 85
    UNIQUE: 10
    LEGENDARY: 5

# ─── 가루 설정 ──────────────────────────────────────────────────────
shard:
  refund:        # 중복 시 지급 가루
    COMMON: 10
    RARE: 40
    UNIQUE: 80
    LEGENDARY: 150
  exchange_cost: # 교환소 가격
    COMMON: 100
    RARE: 500
    UNIQUE: 1000
    LEGENDARY: 2000

# ─── 뽑기권 아이템 설정 ─────────────────────────────────────────────
ticket:
  base_item: PAPER
  model_data: 3001                # 리소스팩 CustomModelData (0이면 기본 외형)
  display_name: "§e치장 뽑기권"
  lore:
    - "§7우클릭하여 사용"
    - "§8뽑기 결과는 자동으로 옷장에 추가됩니다"

# ─── 탈것 뽑기권 ───────────────────────────────────────────────────
# 탈것 카탈로그는 mounts.yml 에서 별도 관리.
# 등급 가중치(gacha.weights)는 치장과 공유, 가루 환급(shard.refund)도 공유.
mount_ticket:
  base_item: PAPER
  model_data: 3002                # 치장 뽑기권과 다른 model_data 권장 (시각적 구분)
  display_name: "§b탈것 뽑기권"
  lore:
    - "§7우클릭하여 사용"
    - "§8뽑기 결과는 자동으로 보유 탈것에 추가"
    - "§8/ride 또는 /탈것 명령으로 소환"
  single_price: 2000              # 1장 가격 (울캐쉬)
  ten_price: 18000                # 10장 묶음 가격 (10% 할인)

# ─── 연출 설정 ──────────────────────────────────────────────────────
# 시간 단위는 틱(20틱 = 1초).
animation:
  duration_ticks: 40              # 연출 시간 (2초)
  result_duration_ticks: 60       # 결과 표시 시간 (3초)
  # 연출 중 무작위로 순환되는 멘트. Title의 메인 라인으로 표시.
  rolling_messages:
    - "§e상품 맞추는 중..."
    - "§e경품 큐브 돌리는 중..."
    - "§e행운을 모으는 중..."
    - "§e운명의 주사위..."
  rolling_subtitle: "§7잠시만 기다려 주세요"
  # 사운드 (Bukkit Sound enum 이름)
  rolling_sound: "BLOCK_NOTE_BLOCK_BELL"
  result_sound: "ENTITY_PLAYER_LEVELUP"
  legendary_sound: "UI_TOAST_CHALLENGE_COMPLETE"
  duplicate_sound: "BLOCK_AMETHYST_BLOCK_CHIME"

# ─── NPC 위치 ──────────────────────────────────────────────────────
# /치장 setnpc 명령으로 설정됨. 수동 편집도 가능.
# npc:
#   world: world
#   x: 100.5
#   y: 64.0
#   z: 200.5
#   yaw: 0.0
#   pitch: 0.0

# ═══════════════════════════════════════════════════════════════════
# 치장 카탈로그
# ═══════════════════════════════════════════════════════════════════
#
# 공통 필드:
#   id          : 고유 식별자
#   type        : HAT / CHEST / LEGS / FEET / WEAPON / WING / TRAIL
#   rarity      : COMMON / RARE / LEGENDARY
#   displayName : 표시 이름 (§ 컬러 코드 가능)
#   description : 한 줄 설명
#   base_item   : CustomModelData를 입힐 베이스 Material
#   model_data  : 리소스팩 CustomModelData 번호
#
# ARMOR/WEAPON 전용:
#   applicable_to: [MATERIAL1, MATERIAL2, ...]  # 비어있으면 모든 경우 적용
#
# WING 전용:
#   offset: [x, y, z]
#   scale: 1.0
#
# TRAIL 전용:
#   particle: FLAME       (org.bukkit.Particle enum)
#   count: 3              (한 번에 생성할 파티클 개수)
#   interval_ticks: 5     (생성 주기)
#
# ═══════════════════════════════════════════════════════════════════

