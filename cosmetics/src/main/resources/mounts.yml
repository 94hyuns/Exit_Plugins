# ═══════════════════════════════════════════════════════════════════
# Cosmetics 플러그인 — 탈것 카탈로그
# ═══════════════════════════════════════════════════════════════════
#
# 공통 필드:
#   id              : 고유 식별자 (소유 추적 키 = "mount/<id>")
#   displayName     : 표시 이름 (§ 컬러 코드 가능)
#   description     : 한 줄 설명
#   rarity          : COMMON / RARE / LEGENDARY
#   mount_type      : GROUND (지상) / FLYING (날탈)
#   entity          : 바닐라 EntityType (예: HORSE, PHANTOM)
#   movement_speed  : 이동속도 (말은 0.2~0.5 권장, 팬텀은 0.5~1.0)
#   max_health      : 최대 체력
#   icon            : GUI 아이콘
#     material      : Material enum
#     model_data    : 리소스팩 CustomModelData (0이면 기본)
#
# 말 전용 (선택):
#   color           : Horse.Color enum (WHITE, CREAMY, CHESTNUT, BROWN, BLACK, GRAY, DARK_BROWN)
#   style           : Horse.Style enum (NONE, WHITE, WHITE_DOTS, BLACK_DOTS, WHITEFIELD)
#
# 팬텀 전용 (선택, 기본 3):
#   phantom_size    : 0(가장 작음) ~ 7(가장 큼)
#
# 뽑기 가중치 (선택, 기본 10):
#   weight          : 같은 등급 내 상대 확률.
#                     같은 RARE 안에 weight=10 인 A 와 weight=30 인 B 가 있으면
#                     A:B = 1:3 비율로 뽑힘. 0 이면 뽑기 풀에서 제외.
#                     등급별 출현 가중치는 config.yml 의 gacha.weights 가 결정.
#
# ModelEngine 모델 (선택):
#   model_engine_id : ModelEngine blueprint id. ModelEngine 플러그인에 등록된 모델명.
#                     bbmodel 파일은 plugins/ModelEngine/blueprints/ 에 두면 자동 등록.
#                     비어있으면 vanilla 엔티티 외형 그대로 사용.
#
# ═══════════════════════════════════════════════════════════════════

mounts:
  - id: vanilla_horse
    displayName: "§f일반 말"
    description: "§7길들여진 평범한 말"
    rarity: COMMON
    weight: 10
    mount_type: GROUND
    entity: HORSE
    movement_speed: 0.3
    max_health: 30.0
    color: WHITE
    style: NONE
    icon:
      material: SADDLE
      model_data: 0

  - id: phantom_mount
    displayName: "§d팬텀"
    description: "§7밤하늘을 가르는 날탈"
    rarity: RARE
    weight: 10
    mount_type: FLYING
    entity: PHANTOM
    movement_speed: 0.4
    max_health: 25.0
    phantom_size: 7              # 0(가장 작음) ~ 7(가장 큼)
    icon:
      material: PHANTOM_MEMBRANE
      model_data: 0

  - id: dinosaur_mount
    displayName: "§6공룡"
    description: "§7고대의 위풍당당한 탈것"
    rarity: LEGENDARY
    weight: 10
    mount_type: GROUND
    entity: HORSE                # vanilla 라이드 가능 베이스. ModelEngine 모델로 외형 교체.
    movement_speed: 0.35
    max_health: 60.0
    model_engine_id: dinosaur_mount_server
    icon:
      material: BONE
      model_data: 0
