# Land 플러그인 설정
land:
  # 청크 구매 가격 (슬롯 1~N, 리스트 길이 = 1인당 최대 청크 수)
  # 첫 슬롯은 "세일", 이후 누진제.
  prices:
    - 500      # 1번째 (세일)
    - 2000     # 2번째
    - 4000     # 3번째
    - 6000     # 4번째
    - 10000    # 5번째
    - 15000    # 6번째
    - 20000    # 7번째
    - 30000    # 8번째
    - 50000    # 9번째

  # 반환 시 환불 비율 (0.0 ~ 1.0). 환불액 = 해당 슬롯 가격 × ratio.
  refund-ratio: 0.75

  # 청크 컨트롤러 아이템 재료
  controller-material: LODESTONE

  # 클레임/보호가 작동할 월드 목록
  allowed-worlds:
    - world_village

  # 정보 모드 ActionBar 갱신 주기 (틱, 20틱 = 1초)
  info-update-ticks: 10
